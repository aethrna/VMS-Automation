<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Lazy VMS — Settings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a32;
    --accent: #e94560;
    --accent-dim: rgba(233,69,96,0.15);
    --green: #39d98a;
    --amber: #f0a500;
    --text: #e8e8f0;
    --muted: #666680;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }

  .shell {
    width: 100%;
    max-width: 520px;
  }

  header {
    margin-bottom: 36px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: var(--mono);
  }

  .field input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input[type="text"]:focus {
    border-color: var(--accent);
  }

  /* Upload zone */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    margin-bottom: 14px;
  }

  .upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone .zone-label { font-size: 12px; color: var(--muted); }
  .upload-zone .zone-label strong { color: var(--text); display: block; font-size: 13px; margin-bottom: 2px; }

  /* Preview strip */
  .preview-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    min-height: 56px;
  }

  .preview-strip img {
    width: 56px;
    height: 40px;
    object-fit: cover;
    border-radius: 5px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .preview-strip .preview-info { flex: 1; }
  .preview-strip .preview-name { font-size: 12px; color: var(--text); font-family: var(--mono); }
  .preview-strip .preview-status { font-size: 11px; margin-top: 2px; }
  .preview-strip .preview-status.ok { color: var(--green); }
  .preview-strip .preview-status.waiting { color: var(--muted); }
  .preview-strip .preview-status.loading { color: var(--amber); }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

  .save-bar {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--mono);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--green);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="eyebrow">Extension Settings</div>
    <h1>Lazy <span>VMS</span></h1>
    <p class="subtitle">Configure once. Tap the icon to register.</p>
  </header>

  <div class="section">
    <div class="section-label">Visitor Info</div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Rizki Kemarajaya">
    </div>
    <div class="field">
      <label>Company ID</label>
      <input type="text" id="companyId" placeholder="e.g. 5">
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="e.g. 08123456789">
    </div>
  </div>

  <div class="section">
    <div class="section-label">KTP / ID Card</div>
    <div class="preview-strip" id="ktpStrip">
      <div class="preview-info">
        <div class="preview-name">ktp_photo</div>
        <div class="preview-status waiting" id="ktpStatus">No image saved</div>
      </div>
    </div>
    <div class="upload-zone" id="ktpZone">
      <input type="file" id="ktpInput" accept="image/*">
      <div class="icon">🪪</div>
      <div class="zone-label"><strong>Tap to upload KTP</strong>JPG, PNG, HEIC accepted</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Selfie / Face Photo</div>
    <div class="preview-strip" id="faceStrip">
      <div class="preview-info">
        <div class="preview-name">face_photo</div>
        <div class="preview-status waiting" id="faceStatus">No image saved</div>
      </div>
    </div>
    <div class="upload-zone" id="faceZone">
      <input type="file" id="faceInput" accept="image/*">
      <div class="icon">🤳</div>
      <div class="zone-label"><strong>Tap to upload selfie</strong>JPG, PNG, HEIC accepted</div>
    </div>
  </div>

  <div class="save-bar">
    <button class="btn-save" id="saveBtn">Save All Settings</button>
  </div>
</div>

<div class="toast" id="toast">✓ Settings saved</div>

<script src="options.js"></script>
</body>
</html>
