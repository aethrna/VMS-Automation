<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 100vw;
    max-width: 480px;
    min-width: 280px;
    background: #0d0d0f;
    color: #e8e8f0;
    font-family: 'IBM Plex Mono', monospace, sans-serif;
    padding: 20px;
  }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .title { font-size: 20px; font-weight: 600; }
  .title span { color: #e94560; }
  .settings-link {
    font-size: 13px; color: #666680; background: #141418;
    border: 1px solid #2a2a32; padding: 8px 14px; border-radius: 8px; cursor: pointer;
  }
  .settings-link:hover { color: #e8e8f0; border-color: #e94560; }
  .status-list { margin-bottom: 18px; }
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: #141418; border: 1px solid #2a2a32;
    border-radius: 9px; margin-bottom: 8px; font-size: 14px;
  }
  .status-row .key { color: #666680; }
  .val { font-weight: 600; }
  .val.ok { color: #39d98a; }
  .val.missing { color: #e94560; }
  .btn-register {
    width: 100%; background: #e94560; color: white; border: none;
    border-radius: 12px; padding: 18px; font-size: 16px; font-weight: 600;
    font-family: inherit; cursor: pointer; letter-spacing: 0.04em;
  }
  .btn-register:disabled { background: #4a1520; color: #7a3040; cursor: not-allowed; }
  .hint { font-size: 11px; color: #444460; text-align: center; margin-top: 12px; line-height: 1.5; }
  .error-box {
    display: none; background: #2a0a0f; border: 1px solid #e94560;
    border-radius: 10px; padding: 12px; margin-top: 12px;
    font-size: 12px; color: #e94560; line-height: 1.6; word-break: break-word;
  }
</style>
</head>
<body>
<div class="header">
  <div class="title">Lazy <span>VMS</span></div>
  <span class="settings-link" id="openSettings">⚙ Setup</span>
</div>
<div class="status-list">
  <div class="status-row"><span class="key">Name</span><span class="val" id="stName">—</span></div>
  <div class="status-row"><span class="key">KTP</span><span class="val" id="stKtp">—</span></div>
  <div class="status-row"><span class="key">Face</span><span class="val" id="stFace">—</span></div>
</div>
<button class="btn-register" id="registerNow">REGISTER &amp; GET QR</button>
<div class="error-box" id="errorBox"></div>
<p class="hint" id="hint"></p>
<script src="popup.js"></script>
</body>
</html>
